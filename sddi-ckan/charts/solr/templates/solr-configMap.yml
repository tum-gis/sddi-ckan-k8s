{{- if .Values.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "solr.fullname" . }}-cfg
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "solr.labels" . | nindent 4 }}
    app.kubernetes.io/part-of: sddi-ckan
    app.kubernetes.io/component: database
data:
  SOLR_CORE: {{ .Values.core | quote }}
  SOLR_VERSION: {{ .Values.image.tag | quote }}
{{- end -}}
